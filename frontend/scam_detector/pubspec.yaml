name: scam_detector
description: AI-powered Scam Link Detection Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP Client
  dio: ^5.4.0

  # Secure Storage (JWT)
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # State Management
  provider: ^6.1.1

  # Navigation
  go_router: ^13.2.0

  # Charts
  fl_chart: ^0.68.0

  # Permissions
  permission_handler: ^11.3.0

  # Local Notifications
  flutter_local_notifications: ^17.1.2

  # Background tasks
  workmanager: ^0.5.2

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  url_launcher: ^6.2.5
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
